<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request Center - Server Probe Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260611-permissions" />
  </head>
  <body>
    <div class="app-shell">
      <div id="toast" class="toast" hidden></div>
      <header class="topbar">
        <div>
          <p class="eyebrow">Access Request</p>
          <h1 id="pageTitle">申请中心</h1>
        </div>
        <div class="status-strip compact">
          <div class="stat-chip"><span id="pendingCount">0</span><small>待处理</small></div>
          <div class="stat-chip warn"><span id="approvedCount">0</span><small>已通过</small></div>
          <div class="stat-chip danger"><span id="rejectedCount">0</span><small>已拒绝</small></div>
        </div>
      </header>

      <section class="toolbar request-toolbar">
        <a id="dashboardLink" class="button ghost link-button" href="/">监控面板</a>
        <span id="userBadge" class="toolbar-note"></span>
        <button id="logoutButton" class="button ghost" type="button">退出</button>
      </section>

      <nav id="pageTabs" class="page-tabs" aria-label="申请中心页面">
        <button class="tab-button" type="button" data-page="submit" data-user-only>提交申请</button>
        <button class="tab-button" type="button" data-page="review">我的申请</button>
        <button class="tab-button" type="button" data-page="password">修改密码</button>
        <button class="tab-button" type="button" data-page="accounts" data-admin-only hidden>账号管理</button>
      </nav>

      <main>
        <section id="submitPage" class="page-view">
          <div class="request-panel">
            <div class="panel-head">
              <h2>提交申请</h2>
              <span id="submitHint">选择临时账号或长期接入</span>
            </div>

            <div class="mode-switch" role="tablist" aria-label="申请类型">
              <button class="mode-button active" type="button" data-kind="temporary">临时账号</button>
              <button class="mode-button" type="button" data-kind="access">长期接入</button>
            </div>

            <form id="temporaryForm" class="request-form">
              <label>模型名称 <input name="model_name" placeholder="例如 Llama / Qwen / custom model" required /></label>
              <label>模型规模 <input name="model_size" placeholder="例如 7B, 32B, 72B" /></label>
              <label>
                使用方式
                <select name="access_type">
                  <option value="ssh">需要机器/SSH</option>
                  <option value="api">只需要 API</option>
                  <option value="both">机器和 API 都需要</option>
                </select>
              </label>
              <div class="form-grid">
                <label>GPU 数量 <input name="gpu_count" type="number" min="0" max="16" value="1" /></label>
                <label>单卡空闲显存 GB <input name="gpu_memory_gb" type="number" min="0" step="0.5" value="16" /></label>
                <label>预计时长 小时 <input name="duration_hours" type="number" min="1" step="1" value="24" required /></label>
              </div>
              <div class="form-grid">
                <label>希望机器 <select name="target_machine" data-machine-select><option value="">系统推荐</option></select></label>
                <label>希望账号名 <input name="requested_account" autocomplete="off" placeholder="可选" /></label>
                <label>希望密码 <input name="requested_password" type="password" autocomplete="new-password" placeholder="可选" /></label>
              </div>
              <label>用途说明 <textarea name="purpose" rows="4" required placeholder="说明要跑什么、预计负载、是否需要独占"></textarea></label>
              <label>补充说明 <textarea name="notes" rows="3" placeholder="环境、端口、数据路径等要求"></textarea></label>
              <button class="button" type="submit">提交临时账号申请</button>
              <p id="temporaryMessage" class="form-message"></p>
            </form>

            <form id="accessForm" class="request-form" hidden>
              <div class="form-grid">
                <label>姓名 <input name="owner_name" id="ownerName" required /></label>
                <label>申请账号名 <input name="requested_account" autocomplete="off" required /></label>
                <label>申请密码 <input name="requested_password" type="password" autocomplete="new-password" required /></label>
              </div>
              <label>希望申请的机器 <select name="target_machine" data-machine-select required><option value="">请选择机器</option></select></label>
              <label>申请原因 <textarea name="purpose" rows="4" placeholder="说明为什么需要长期接入"></textarea></label>
              <label>补充说明 <textarea name="notes" rows="3" placeholder="例如环境、端口、数据路径、导师/项目等"></textarea></label>
              <button class="button" type="submit">提交长期接入申请</button>
              <p id="accessMessage" class="form-message"></p>
            </form>
          </div>
        </section>

        <section id="reviewPage" class="page-view" hidden>
          <section class="request-panel wide">
            <div class="panel-head">
              <h2 id="requestListTitle">我的申请</h2>
              <button id="reloadButton" class="button ghost" type="button">刷新</button>
            </div>
            <div id="requestList" class="request-list"></div>
          </section>
        </section>

        <section id="passwordPage" class="page-view" hidden>
          <section class="request-panel wide">
            <div class="panel-head">
              <h2>修改密码</h2>
              <span>同时同步同名机器账号密码</span>
            </div>
            <form id="passwordForm" class="request-form">
              <div class="form-grid">
                <label data-password-admin>目标用户 <select name="username"></select></label>
                <label data-password-current>当前密码 <input name="current_password" type="password" autocomplete="current-password" /></label>
                <label>新密码 <input name="new_password" type="password" autocomplete="new-password" required /></label>
              </div>
              <div class="form-grid">
                <label>确认新密码 <input name="confirm_password" type="password" autocomplete="new-password" required /></label>
                <label class="checkbox-line"><input name="sync_machine_password" type="checkbox" checked /> 同步机器账号</label>
              </div>
              <button class="button" type="submit">更新密码</button>
              <p id="passwordMessage" class="form-message"></p>
            </form>
          </section>
        </section>

        <section id="accountsPage" class="page-view" hidden>
          <section class="request-panel wide">
            <div class="panel-head">
              <h2>开通机器账号</h2>
              <span>管理员主动创建临时或长期机器账号</span>
            </div>
            <form id="directProvisionForm" class="request-form">
              <div class="form-grid">
                <label>
                  类型
                  <select name="account_type">
                    <option value="temporary">临时账号</option>
                    <option value="access">长期账号</option>
                  </select>
                </label>
                <label>姓名 <input name="owner_name" /></label>
                <label>目标机器 <select name="target_machine" data-machine-select required><option value="">请选择机器</option></select></label>
              </div>
              <div class="form-grid">
                <label>账号名 <input name="username" autocomplete="off" placeholder="留空则自动生成" /></label>
                <label>密码 <input name="password" type="password" autocomplete="new-password" placeholder="留空则自动生成" /></label>
                <label data-duration-field>临时账号时长 小时 <input name="duration_hours" type="number" min="1" step="1" value="24" /></label>
              </div>
              <button class="button" type="submit">创建机器账号</button>
              <p id="directProvisionMessage" class="form-message"></p>
            </form>
          </section>

          <section class="request-panel wide">
            <div class="panel-head">
              <h2>账号管理</h2>
              <span>管理员创建或重置可登录本页面的账号</span>
            </div>
            <form id="userForm" class="request-form compact-form">
              <label>用户名 <input name="username" required /></label>
              <label>姓名 <input name="display_name" /></label>
              <label>初始密码 <input name="password" type="password" required /></label>
              <label>
                角色
                <select name="role">
                  <option value="user">普通用户</option>
                  <option value="admin">管理员</option>
                </select>
              </label>
              <label class="checkbox-line"><input name="can_view_dashboard" type="checkbox" /> 允许看监控</label>
              <button class="button" type="submit">创建/重置</button>
              <p id="userFormMessage" class="form-message"></p>
            </form>
            <div id="userList" class="mini-list"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="/static/requests.js?v=20260611-permissions"></script>
  </body>
</html>
